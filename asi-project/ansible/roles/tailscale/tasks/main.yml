---
# roles/tailscale/tasks/main.yml
# Install and authenticate Tailscale on Debian 12 (asi-platform)
# Auth key sourced from Ansible Vault — never hardcoded
# Idempotent: will not re-authenticate if already running
#
# PREREQUISITE (manual, on Proxmox host before running this role):
#   echo "lxc.cgroup2.devices.allow: c 10:200 rwm" >> /etc/pve/lxc/100.conf
#   echo "lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file" >> /etc/pve/lxc/100.conf
#   pct restart 100
#
# NOTE: pct set 100 --features tun=1 does NOT work on Proxmox 6.17+
# The tun feature was removed from the LXC schema. Use direct config above.

- name: Install curl
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true

- name: Add Tailscale GPG key
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://pkgs.tailscale.com/stable/debian/bookworm.noarmor.gpg \
        | tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

- name: Add Tailscale apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    content: |
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/debian bookworm main
    mode: '0644'

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if already authenticated
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Parse Tailscale backend state
  ansible.builtin.set_fact:
    tailscale_running: >-
      {{ (tailscale_status.stdout | from_json).BackendState == 'Running'
         if tailscale_status.rc == 0 and tailscale_status.stdout != ''
         else false }}

- name: Authenticate with Tailscale
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_auth_key }}
    --hostname=asi-platform
    --accept-routes=false
  when: not tailscale_running
  no_log: true

- name: Verify Tailscale is connected
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Show Tailscale IP
  ansible.builtin.debug:
    msg: "Tailscale IP: {{ tailscale_ip.stdout }}"
